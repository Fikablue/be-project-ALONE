name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          docker build -t my-image-name:latest -f Dockerfile .

      - name: Remove Old Container (if exists)
        shell: powershell
        run: |
          docker rm -f backend 2>$null

      - name: Run Docker Container
        run: |
          docker run -d --name backend -p 3000:3000 my-image-name:latest

      - name: Show Docker Images
        run: docker images

      - name: Show Docker Containers
        run: docker ps
